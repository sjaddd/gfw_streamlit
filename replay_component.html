<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vessel Replay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080f1e; color: #e8edf5; font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #map { flex: 1; background: #080f1e; }
  #overlay { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; min-width: 220px; isolation: isolate; }
  .model-card { background: rgba(8,15,30,0.92); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 12px 16px; }
  .model-name { font-size: 11px; color: #6b7fa3; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; font-weight: 600; }
  .pred-row { font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .pred-label { font-size: 13px; font-weight: 600; min-width: 100px; }
  .pred-label.fishing    { color: #D85A30; }
  .pred-label.transiting { color: #378ADD; }
  .prob-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .prob-fill { height: 100%; border-radius: 2px; transition: width 0.15s ease; }
  .prob-fill.fishing    { background: #D85A30; }
  .prob-fill.transiting { background: #378ADD; }
  .prob-val { font-size: 12px; font-family: monospace; font-weight: 600; min-width: 36px; text-align: right; }
  .match-ind { font-size: 13px; margin-left: 2px; min-width: 16px; }
  #info-bar { background: rgba(8,15,30,0.95); border-top: 1px solid rgba(255,255,255,0.08); padding: 8px 16px; display: flex; gap: 20px; align-items: center; z-index: 1000; flex-shrink: 0; }
  .info-item { display: flex; flex-direction: column; gap: 1px; }
  .info-label { font-size: 10px; color: #6b7fa3; text-transform: uppercase; letter-spacing: 0.07em; }
  .info-val   { font-size: 14px; font-weight: 600; font-family: monospace; }
  #progress-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  #progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; }
  #ping-counter { font-size: 11px; color: #6b7fa3; font-family: monospace; white-space: nowrap; }
  .truth-badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .truth-badge.fishing    { background: rgba(216,90,48,0.2);  color: #D85A30; }
  .truth-badge.transiting { background: rgba(55,138,221,0.2); color: #378ADD; }
  .leaflet-tile-pane { filter: brightness(0.75) saturate(0.6); }
</style>
</head>
<body>

<div id="map"></div>
<div id="overlay"></div>

<div id="info-bar">
  <div class="info-item">
    <span class="info-label">Speed</span>
    <span class="info-val" id="val-speed">&mdash;</span>
  </div>
  <div class="info-item">
    <span class="info-label">Course</span>
    <span class="info-val" id="val-course">&mdash;</span>
  </div>
  <div class="info-item">
    <span class="info-label">Datetime</span>
    <span class="info-val" id="val-datetime">&mdash;</span>
  </div>
  <div class="info-item">
    <span class="info-label">Ground truth</span>
    <span class="truth-badge" id="val-truth">&mdash;</span>
  </div>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
  <span id="ping-counter">0 / 0</span>
</div>

<script>
// ── Data injected by Streamlit (build_replay_html in app.py) ───────────────

// ── Map ────────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true, attributionControl: false })
             .setView([CENTER_LAT, CENTER_LON], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Fit to trip bounds
const bounds = L.latLngBounds(PINGS.map(p => [p.lat, p.lon]));
map.fitBounds(bounds, { padding: [40, 40] });

// ── Build model cards ──────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
MODEL_NAMES.forEach(name => {
  const id  = name.replace(/\s+/g, '_');
  const div = document.createElement('div');
  div.className = 'model-card';
  div.id = 'card-' + id;

  div.innerHTML = `
    <div class="model-name">${name}</div>
    <span id="trophy-${id}" style="position:absolute;top:8px;right:8px;font-size:14px;display:none;">🏆</span>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span class="pred-label" id="label-${id}">&mdash;</span>
      <span id="acc-pct-${id}" style="font-size:15px;font-weight:700;font-family:monospace;color:#6b7fa3;min-width:80px;text-align:right;">&mdash;</span>
    </div>
    <div class="prob-wrap" style="margin-bottom:6px;">
      <div class="prob-fill" id="bar-${id}" style="width:0%"></div>
    </div>
    <div style="font-size:10px;color:#6b7fa3;font-family:monospace;">
      <span id="acc-${id}">0 fishing events</span>
    </div>
    <span id="prob-${id}" style="display:none"></span>
    <span id="match-ind-${id}" style="display:none"></span>`;

  div.style.position = 'relative';
  overlay.appendChild(div);  
});

const tp = {};  // true positives  (predicted fishing, was fishing)
const fp = {};  // false positives (predicted fishing, not fishing)
const fn = {};  // false negatives (predicted not fishing, was fishing)
const totalCounts = {};

MODEL_NAMES.forEach(name => {
  tp[name] = 0;
  fp[name] = 0;
  fn[name] = 0;
  totalCounts[name] = 0;
});

// ── Leaflet layers ─────────────────────────────────────────────────────────
const FISHING_COLOR = '#D85A30';
const TRANSIT_COLOR = '#378ADD';
const CURRENT_COLOR = '#ffffff';

// Ghost track (full trip, faint)
L.polyline(PINGS.map(p => [p.lat, p.lon]), {
  color: 'rgba(255,255,255,0.12)', weight: 1.5, smoothFactor: 1
}).addTo(map);

// Animated track polyline
const trackLine = L.polyline([], {
  color: 'rgba(255,255,255,0.55)', weight: 2
}).addTo(map);

// Past ping dots
const pingLayer = L.layerGroup().addTo(map);

// Current position marker — white gliding dot
const currentMarker = L.circleMarker([CENTER_LAT, CENTER_LON], {
  radius: 9, color: '#080f1e', weight: 2,
  fillColor: CURRENT_COLOR, fillOpacity: 1
}).addTo(map);

// ── Animation state ────────────────────────────────────────────────────────
let currentStep  = 0;   // index of the ping we are travelling FROM
let stepProgress = 0.0; // 0.0 → 1.0 fraction of the way to next ping
let lastTimestamp = null;
let MS_PER_PING   = 800; // controlled by speed select in info bar

// ── Info bar helpers ───────────────────────────────────────────────────────
function updateInfoBar(s) {
  const curr = PINGS[s];

  document.getElementById('val-speed').textContent    = curr.speed.toFixed(1) + ' kts';
  document.getElementById('val-course').textContent   = curr.course.toFixed(0) + '\u00b0';
  document.getElementById('val-datetime').textContent = curr.datetime.slice(0, 16).replace('T', ' ');

  const truthEl = document.getElementById('val-truth');
  if (curr.is_fishing === 1) {
    truthEl.textContent = '\uD83C\uDFA3 Fishing';
    truthEl.className   = 'truth-badge fishing';
  } else {
    truthEl.textContent = '\u26F5 Transiting';
    truthEl.className   = 'truth-badge transiting';
  }

  // Progress — based on step fraction for smooth bar movement
  const totalProgress = (currentStep + stepProgress) / (PINGS.length - 1);
  document.getElementById('progress-fill').style.width = (totalProgress * 100).toFixed(2) + '%';
  document.getElementById('ping-counter').textContent  = (s + 1) + ' / ' + PINGS.length;
}

function updateModelCards(s) {
  const curr = PINGS[s];
  MODEL_NAMES.forEach(name => {
    const id      = name.replace(/\s+/g, '_');
    const pred    = PREDS[name][s];
    const fish    = pred.label === 1;
    const pct     = Math.round(pred.prob * 100);
    const correct = pred.label === curr.is_fishing;

    if (totalCounts[name] <= s) {
      totalCounts[name]++;
      const predicted = pred.label;
      const actual    = curr.is_fishing;

      if (predicted === 1 && actual === 1) tp[name]++;
      else if (predicted === 1 && actual === 0) fp[name]++;
      else if (predicted === 0 && actual === 1) fn[name]++;
    }    

    const labelEl  = document.getElementById('label-' + id);
    const barEl    = document.getElementById('bar-'   + id);
    const probEl   = document.getElementById('prob-'  + id);
    const matchEl  = document.getElementById('match-ind-' + id);
    const accEl    = document.getElementById('acc-'   + id);
    const accPctEl = document.getElementById('acc-pct-' + id);

    labelEl.textContent = fish ? '\uD83C\uDFA3 Fishing' : '\u26F5 Transiting';
    labelEl.className   = 'pred-label ' + (fish ? 'fishing' : 'transiting');

    barEl.style.width = pct + '%';
    barEl.className   = 'prob-fill ' + (fish ? 'fishing' : 'transiting');

    probEl.textContent = pct + '%';
    probEl.style.color = fish ? FISHING_COLOR : TRANSIT_COLOR;

    matchEl.textContent = correct ? '\u2713' : '\u2717';
    matchEl.style.color = correct ? '#1D9E75' : '#D85A30';

    // Running F1-score
    const f1  = f1Score(name);
    const total = totalCounts[name];

    accEl.textContent    = `${tp[name]+fp[name]+fn[name]} fishing events`;
    accPctEl.textContent = total > 0 ? 'F1: ' + f1.toFixed(2) : '—';
    accPctEl.style.color = f1 >= 0.7 ? '#1D9E75' : f1 >= 0.5 ? '#EF9F27' : '#D85A30';      
  });
}

function f1Score(name) {
  const precision = tp[name] + fp[name] > 0
    ? tp[name] / (tp[name] + fp[name]) : 0;
  const recall = tp[name] + fn[name] > 0
    ? tp[name] / (tp[name] + fn[name]) : 0;
  return precision + recall > 0
    ? 2 * precision * recall / (precision + recall) : 0;
}

// ── Main animation tick ────────────────────────────────────────────────────
function tick(timestamp) {
  if (paused) return;
  if (!lastTimestamp) lastTimestamp = timestamp;
  const elapsed = timestamp - lastTimestamp;
  lastTimestamp = timestamp;

  stepProgress += elapsed / MS_PER_PING;

  // Handle step completion — may need to advance multiple steps if
  // elapsed time was large (e.g. tab was backgrounded)
  while (stepProgress >= 1.0 && currentStep < PINGS.length - 1) {
    stepProgress -= 1.0;
    currentStep++;

    // Place a dot at the ping we just completed travelling FROM
    const arrived = PINGS[currentStep - 1];
    L.circleMarker([arrived.lat, arrived.lon], {
      radius: 4,
      color: 'transparent',
      fillColor: arrived.is_fishing === 1 ? FISHING_COLOR : TRANSIT_COLOR,
      fillOpacity: 0.85
    }).addTo(pingLayer);
  }

  // End of trip — pause then loop
  if (currentStep >= PINGS.length - 1) {
    // Place final dot
    const last = PINGS[PINGS.length - 1];
    L.circleMarker([last.lat, last.lon], {
      radius: 4, color: 'transparent',
      fillColor: last.is_fishing === 1 ? FISHING_COLOR : TRANSIT_COLOR,
      fillOpacity: 0.85
    }).addTo(pingLayer);

    currentMarker.setLatLng([last.lat, last.lon]);
    if (followVessel) {
      map.panTo([last.lat, last.lon], { animate: true, duration: MS_PER_PING / 1000 * 0.8 });
    } 
    updateInfoBar(PINGS.length - 1);
    updateModelCards(PINGS.length - 1);

    // Find best model
    const bestModel = MODEL_NAMES.reduce((best, name) =>
      f1Score(name) > f1Score(best) ? name : best
    );    

    MODEL_NAMES.forEach(name => {
      const id    = name.replace(/\s+/g, '_');
      const card  = document.getElementById('card-' + id);
      const pctEl = document.getElementById('acc-pct-' + id);

      if (name === bestModel) {
        card.style.background = 'rgba(15,35,25,0.94)';
        pctEl.textContent = 'F1: ' + f1Score(name).toFixed(2);
        pctEl.style.color = '#1D9E75';
        document.getElementById('trophy-' + id).style.display = 'block';
      } else {
        card.style.background = '';
        const f1val = f1Score(name);
        pctEl.style.color = f1val >= 0.7 ? '#1D9E75' : f1val >= 0.5 ? '#EF9F27' : '#D85A30';
        document.getElementById('trophy-' + id).style.display = 'none';        
      }      
    }); 

    setTimeout(() => {
        currentStep  = 0;
        stepProgress = 0;
        lastTimestamp = null;
        // Don't restart — update pause button to show Replay
        paused = true;
        document.getElementById('pause-btn').textContent = '↺ Replay';
    }, 2000);    

    return;
  }

  // ── Interpolate position between currentStep and currentStep+1 ──────────
  const clampedProgress = Math.min(stepProgress, 1.0);
  const from = PINGS[currentStep];
  const to   = PINGS[currentStep + 1];

  const lat = from.lat + (to.lat - from.lat) * clampedProgress;
  const lon = from.lon + (to.lon - from.lon) * clampedProgress;

  // Update gliding marker
  currentMarker.setLatLng([lat, lon]);

  // Center of vessel (unset to disable)
  // let followVessel = true;
  if (followVessel) map.panTo([lat, lon], { animate: true, duration: MS_PER_PING / 1000 * 0.8 });

  // Extend track line to interpolated position
  const pastCoords = PINGS.slice(0, currentStep + 1).map(p => [p.lat, p.lon]);
  pastCoords.push([lat, lon]);
  trackLine.setLatLngs(pastCoords);

  // Info bar and model cards update at each real ping boundary
  updateInfoBar(currentStep);
  updateModelCards(currentStep);

  requestAnimationFrame(tick);
}

// ── Add speed selector to info bar ────────────────────────────────────────
const speedItem = document.createElement('div');
speedItem.className = 'info-item';
speedItem.innerHTML = `
  <span class="info-label">Speed</span>
  <select id="speed-select" style="background:#0d1a2e;color:#e8edf5;border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:2px 6px;font-size:12px;font-family:monospace;">
    <option value="1600">0.5×</option>
    <option value="800" selected>1×</option>
    <option value="400">2×</option>
    <option value="160">5×</option>
    <option value="80">10×</option>
  </select>`;

// Insert before progress bar
const progressWrap = document.getElementById('progress-wrap');
document.getElementById('info-bar').insertBefore(speedItem, progressWrap);

document.getElementById('speed-select').addEventListener('change', function() {
  MS_PER_PING = parseInt(this.value);
});

// ── Add pause button to info bar ──────────────────────────────────────────
let paused = false;
const pauseItem = document.createElement('div');
pauseItem.innerHTML = `
  <button id="pause-btn" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#e8edf5;border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;white-space:nowrap;">
    ⏸ Pause
  </button>`;
document.getElementById('info-bar').insertBefore(pauseItem, progressWrap);

document.getElementById('pause-btn').addEventListener('click', function() {
  
  if (this.textContent.includes('Replay')) {
    console.log('Taking replay branch');
    currentStep  = 0;
    stepProgress = 0;
    lastTimestamp = null;
    pingLayer.clearLayers();
    trackLine.setLatLngs([]);
    MODEL_NAMES.forEach(name => {
      tp[name] = 0;
      fp[name] = 0;
      fn[name] = 0;
      totalCounts[name] = 0;
      const id = name.replace(/\s+/g, '_');
      const resetCard = document.getElementById('card-' + id);
      resetCard.style.background = '';
    });  
    paused = false;
    this.textContent = '⏸ Pause';
    requestAnimationFrame(tick);
  } else {
    console.log('Taking pause/play branch');
    paused = !paused;
    this.textContent = paused ? '▶ Play' : '⏸ Pause';
    if (!paused) {
      lastTimestamp = null;
      requestAnimationFrame(tick);
    }
  }
});

// ── Add follow vessel toggle ───────────────────────────────────────────────
let followVessel = true;
const followItem = document.createElement('div');
followItem.innerHTML = `
  <button id="follow-btn" style="background:rgba(55,138,221,0.2);border:1px solid rgba(55,138,221,0.4);color:#378ADD;border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;white-space:nowrap;">
    📍 Following
  </button>`;
document.getElementById('info-bar').insertBefore(followItem, progressWrap);

document.getElementById('follow-btn').addEventListener('click', function() {
  followVessel = !followVessel;
  if (followVessel) {
    this.textContent    = '📍 Following';
    this.style.background    = 'rgba(55,138,221,0.2)';
    this.style.borderColor   = 'rgba(55,138,221,0.4)';
    this.style.color         = '#378ADD';
  } else {
    this.textContent    = '🗺️ Free map';
    this.style.background    = 'rgba(255,255,255,0.08)';
    this.style.borderColor   = 'rgba(255,255,255,0.15)';
    this.style.color         = '#e8edf5';
  }
});

// ── Start ──────────────────────────────────────────────────────────────────
map.whenReady(() => {
  setTimeout(() => requestAnimationFrame(tick), 300);
});
</script>
</body>
</html>
